<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maintenance temporaire</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    :root {
      --bg: #000;
      --fg: #fff;
      --accent: #e50914;
    }

    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      color: #aaa;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 6px solid #222;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      position: absolute;
      bottom: 15px;
      font-size: 13px;
      color: #555;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="logo">NAYZCINE</div>
  <h1>Site en maintenance temporaire</h1>
  <p>Nous travaillons actuellement pour améliorer votre expérience.  
     Le service sera de retour très bientôt. Merci de votre patience.</p>
  <div class="loader"></div>

  <footer>© 2025 Nayzcine</footer>
</body>
</html>
