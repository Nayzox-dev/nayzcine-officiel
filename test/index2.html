<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vidéo Fullscreen sans lecteur</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: sans-serif;
    }
    video {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
      background: #000;
    }
    .btn {
      position: fixed; bottom: 20px; left: 20px;
      padding: 10px 18px;
      background: rgba(0,0,0,0.6);
      color: #fff; border: none; border-radius: 4px;
      cursor: pointer; z-index: 10;
      transition: background .3s;
    }
    .btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <video id="film" autoplay muted loop playsinline preload="auto">
    <source id="src" 
            src="https://cinepizza.xyz/movies/Destination-Finale-Bloodlines.mp4" 
            type="video/mp4">
    Votre navigateur ne supporte pas la vidéo HTML5.
  </video>

  <button class="btn" id="toggle">Pause</button>

  <script>
    const v = document.getElementById('film');
    const src = document.getElementById('src');
    const btn = document.getElementById('toggle');

    // toggle play/pause
    btn.addEventListener('click', ()=>{
      if(v.paused){ v.play(); btn.textContent='Pause'; }
      else       { v.pause(); btn.textContent='Lecture'; }
    });

    // tente autoplay ; si ça bloque, recharge via proxy
    v.play().catch(_=>{
      console.warn('Autoplay bloqué, on passe par proxy...');
      const proxy = 'https://api.allorigins.win/raw?url=';
      src.src = proxy + encodeURIComponent(src.src);
      v.load();
      v.play().catch(e=>console.error('Échec proxy:', e));
    });
  </script>

</body>
</html>
